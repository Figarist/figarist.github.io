<head>
    <meta charset="utf-8">

    <!-- Viewport & Meta Base -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#f2f0eb">
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="Whr2bJTggESM1pyCXLfqwodNQu6cNqk_XKdZ0ix2Tyk" />

    <!-- Favicon -->
    <link rel="shortcut icon" type="image/png" href="{{ '/assets/images/figaristgithub.png' | relative_url }}">
    <link rel="apple-touch-icon" href="{{ '/assets/images/figaristgithub.png' | relative_url }}">

    <!-- PWA Manifest -->
    <link rel="manifest" href="{{ '/manifest.json' | relative_url }}">

    <!-- Localized Meta Description for Homepage (prevents duplicates) -->
    {% if page.is_home %}
    {% assign page.description = site.data[site.active_lang].strings.bio_tagline | default: site.description %}
    {% endif %}

    <!-- Jekyll SEO Tag (Generates Title, OG, Twitter, Canonical) 
         We block its default JSON-LD on the home page using a custom liquid workaround 
         because we already explicitly generate superior E-E-A-T schemas manually. -->
    {% seo %}
    {% if page.is_home %}
    <script>
        // Quick clean up of duplicate unneeded jekyll-seo-tag JSON-LD.
        // Liquid jekyll-seo-tag doesn't allow disabling JSON-LD per page natively.
        var ldscripts = document.querySelectorAll('script[type="application/ld+json"]');
        if (ldscripts.length > 1) {
            // Remove the first generic schema that jekyll-seo-tag generates without Person/E-E-A-T data
            ldscripts[0].remove();
        }
    </script>
    {% endif %}

    <!-- Polyglot: Generates Hreflang logic perfectly -->
    {% I18n_Headers %}

    <!-- RSS Feeds -->
    {% feed_meta %}
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

    <!-- Analytics (Local Proxy) -->
    <script data-goatcounter="https://figarist.goatcounter.com/count" async
        src="{{ '/assets/vendor/count.js' | relative_url }}"></script>

    {% include lang-redirect.html %}

</head>
